name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
  AUTH_SECRET: "ci-test-secret-key-32-characters!!"

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        # Skip the postinstall regeneration here — we do it explicitly below
        # AFTER populating src/modules so the registry + Prisma client reflect
        # the full set of first-party modules.
        env:
          SKIP_POSTINSTALL: "1"
        run: npm ci

      # Fresh clones start with src/modules empty (runtime install state, see
      # .gitignore + docs/CONTRIBUTING.md). For the type check to see module-
      # contributed Prisma models (WebhookLog, BlogComment, StoreProduct, …)
      # and module-registered routes, we seed src/modules/ from the tracked
      # module-sources/ directory — the same files the marketplace ZIPs are
      # built from.
      - name: Seed src/modules/ from module-sources
        run: |
          set -euo pipefail
          rm -rf src/modules
          cp -R module-sources src/modules

      - name: Merge Prisma schema + generate client
        run: npx tsx scripts/merge-schemas.ts

      - name: Generate themes & registry & openapi
        run: |
          npm run generate:themes
          npx tsx scripts/generate-registry.ts
          npx tsx scripts/generate-openapi.ts

      - name: TypeScript check
        run: npx tsc --noEmit

      # Lint runs in report-only mode for now. The existing codebase has
      # React 19's new hook rules (set-state-in-effect, purity) triggering
      # across pre-existing admin pages; migrating those is its own sweep.
      # TypeScript + tests still hard-fail the job.
      - name: Lint (report only)
        run: npm run lint || true

      - name: Security audit (fails on high/critical)
        run: npm audit --audit-level=high

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
