name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
  AUTH_SECRET: "ci-test-secret-key-32-characters!!"

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Generate themes & registry
        run: npm run generate:themes && npx tsx scripts/generate-registry.ts

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Security audit (fails on high/critical)
        run: npm audit --audit-level=high

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
