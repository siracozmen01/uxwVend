name: Feature request
description: Suggest an idea or enhancement for uxwVend
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve? What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or change you'd like to see.
    validations:
      required: true
  - type: dropdown
    id: layer
    attributes:
      label: Which layer?
      description: uxwVend keeps a strict core / module / theme separation.
      options:
        - New or existing module (preferred for features)
        - Theme
        - Core infrastructure
        - Not sure
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've considered.
    validations:
      required: false
