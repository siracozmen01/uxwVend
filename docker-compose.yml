services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: uxwvend
      POSTGRES_USER: uxwvend
      POSTGRES_PASSWORD: uxwvend_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://uxwvend:uxwvend_secret@db:5432/uxwvend
      AUTH_SECRET: change-this-to-a-random-secret
      AUTH_URL: http://localhost:3001
      NEXTAUTH_URL: http://localhost:3001
    depends_on:
      - db

volumes:
  pgdata:
